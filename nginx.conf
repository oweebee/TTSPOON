server {
    listen 3945;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ne jamais mettre en cache le HTML/JS/CSS : un redeploy sert toujours les fichiers frais
    location ~* \.(?:html|js|css)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
}
